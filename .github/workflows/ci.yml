# ─────────────────────────────────────────────────────────────────────────────
# ns-O-RAN-flexric  –  CI/CD Pipeline
#
# Trigger : workflow_dispatch  (manual – click "Run workflow" in GitHub Actions)
# Runner  : ubuntu-latest (Ubuntu 24.04)
#
# The pipeline has SEVEN jobs with the following dependency graph:
#
#          ┌─────────────────┐    ┌──────────────────┐
#          │  install-deps   │    │  install-e2sim   │
#          │  (pre-flight)   │    │  (builds E2SIM)  │
#          └────────┬────────┘    └────────┬─────────┘
#                   │                     │
#                   │                     │
#          ┌────────▼────────┐    ┌───────▼─────────┐
#          │ install-flexric │    │  test-e2sim     │
#          │  (builds SMs)   │    │  (validates E2SIM)
#          └────────┬────────┘    └───────┬─────────┘
#                   │                     │
#                   │                     │
#            ┌──────▼──────┐      ┌───────▼─────────┐
#            │  test-flexric │      │
#            │  (validates SMs)│      │
#            └──────┬──────┘      └───────┬─────────┘
#                   │                     │
#                   └────────────┬────────┘
#                                │
#                          ┌─────▼─────┐
#                          │  test-ns3 │
#                          │  (validates ns-3)
#                          └───────────┘
#
# • install-deps  runs first on its own runner and installs every package
#   required by all three components.  This acts as a fast pre-flight check:
#   if any package is unavailable on the target Ubuntu version the pipeline
#   fails here before spending time on the longer build jobs.
# • install-e2sim and install-flexric can start in parallel with install-deps.
#   install-e2sim builds the E2SIM tree and publishes it as an artifact.
#   install-flexric builds and installs FlexRIC, then publishes the installed tree.
# • test-e2sim validates the E2SIM artifact produced by install-e2sim.
# • test-flexric validates the FlexRIC installed tree produced by install-flexric.
# • test-ns3 validates the ns-3 build artifact produced by the upstream jobs.
# ─────────────────────────────────────────────────────────────────────────────

name: ns-O-RAN-flexric CI

on:
  workflow_dispatch:   # triggered manually from the GitHub Actions UI

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 0 – Install Base Dependencies (pre-flight check)
  #
  # Installs every package required by all three components in one place.
  # Running this as a dedicated first job means:
  #   1. The full dependency list is documented in a single visible step.
  #   2. Package availability on the Ubuntu runner is verified once, up-front.
  #   3. install-e2sim and test-flexric may start in parallel with this gate.
  #
  # NOTE: GitHub Actions jobs each run on a fresh virtual machine, so the
  # packages installed here are NOT automatically available in downstream jobs.
  # Each build job still installs what it specifically needs.  This job acts
  # as a canonical, fast-failing smoke-test for the full dependency set.
  # ───────────────────────────────────────────────────────────────────────────
  install-deps:
    name: "Install Base Dependencies"
    runs-on: ubuntu-latest

    steps:

      - name: Update package list and install all required dependencies
        run: |
          sudo apt-get update

          # ── E2SIM requirements ───────────────────────────────────────────
          sudo apt-get install -y \
            build-essential \
            git \
            cmake \
            libsctp-dev \
            autoconf \
            automake \
            libtool \
            bison \
            flex \
            libboost-all-dev

          # ── ns-3 requirements ────────────────────────────────────────────
          # Note: the package name on Ubuntu is g++-13, not g++13.
          sudo apt-get install -y \
            g++-13 \
            python3.8 \
            libc6-dev

          # ── Optional: SQLite (LENA comparison examples) ──────────────────
          sudo apt-get install -y sqlite3 libsqlite3-dev

          # ── Optional: Eigen3 (MIMO features) ────────────────────────────
          sudo apt-get install -y libeigen3-dev

          # ── Docker Compose (GUI features) ────────────────────────────────
          # Installed separately — see https://docs.docker.com/compose/install/

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 – Install and Build E2SIM
  # Builds the E2 simulator and uploads the compiled tree as an artifact.
  # ───────────────────────────────────────────────────────────────────────────
  install-e2sim:
    name: "Install and Build E2SIM"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install E2SIM build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake \
            libsctp-dev autoconf automake libtool \
            bison flex libboost-all-dev g++

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create build directory
        working-directory: e2sim-kpmv3/e2sim
        run: mkdir -p build

      - name: Build E2SIM
        working-directory: e2sim-kpmv3/e2sim
        run: sudo ./build_e2sim.sh 3

      - name: Upload e2sim build artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2sim-build
          path: e2sim-kpmv3/

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 – E2SIM Validation
  # Downloads the compiled E2SIM artifact and validates that the build tree exists.
  # ───────────────────────────────────────────────────────────────────────────
  test-e2sim:
    name: "E2SIM – Validate Build"
    runs-on: ubuntu-latest
    needs: [install-e2sim , install-deps]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download E2SIM build artifact
        uses: actions/download-artifact@v4
        with:
          name: e2sim-build
          path: e2sim-kpmv3/

      - name: Validate E2SIM build artifact
        run: |
          if [ ! -d e2sim-kpmv3/e2sim/build ]; then
            echo "E2SIM build directory missing"
            exit 1
          fi
          echo "E2SIM build artifact is present."

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 – Install and Build FlexRIC
  # Clones FlexRIC from EURECOM GitLab, checks out the pinned commit, builds
  # with the exact CMake flags required by ns-O-RAN, and installs the SMs.
  # ───────────────────────────────────────────────────────────────────────────
  install-flexric:
    name: "Install and Build FlexRIC"
    runs-on: ubuntu-latest

    steps:

      # 1️⃣  Base apt packages required before building anything.
      #     libsctp-dev python3.8 cmake-curses-gui libpcre2-dev python3-dev
      #     are explicitly listed in the FlexRIC prerequisites (section 1.1).
      - name: Install base apt prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git \
            libsctp-dev libssl-dev \
            cmake-curses-gui libpcre2-dev \
            python3-dev python3.8 \
            libconfig-dev libconfig++-dev \
            autoconf automake libtool

      # 2️⃣  FlexRIC requires CMake ≥ 3.22.  Ubuntu's default package is often
      #     older, so we add Kitware's official APT repository (PPA) which
      #     always provides a recent stable release.
      - name: Install CMake ≥ 3.22 (Kitware APT repo)
        run: |
          sudo apt-get install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor - \
            | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
          https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update
          sudo apt-get install -y cmake
          cmake --version

      # 3️⃣  FlexRIC requires SWIG ≥ 4.1.  The apt package (swig) on Ubuntu is
      #     typically 4.0.x, so we build 4.1 from source using the official
      #     release branch as documented in the FlexRIC prerequisites.
      - name: Install SWIG 4.1 from source
        run: |
          git clone https://github.com/swig/swig.git
          cd swig
          git checkout release-4.1
          ./autogen.sh
          ./configure --prefix=/usr/
          make -j$(nproc)
          sudo make install
          swig -version

      # 4️⃣  FlexRIC requires gcc/g++ 13 specifically.
      #     We install gcc-13 / g++-13 and register them as the default
      #     compiler via update-alternatives so CMake picks them up.
      - name: Install GCC-13 and set as default compiler
        run: |
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130
          gcc --version
          g++ --version

      # 5️⃣  The FlexRIC build generates NR RRC source files using asn1c.
      #     The system asn1c package does not have the required codegen
      #     support; the build fails with "ASN1C_EXEC_PATH-NOTFOUND".
      #     We remove the system package and build the exact pinned commit
      #     (940dd5fa) from the mouse07410 fork into /opt/asn1c, then
      #     register that path in GITHUB_PATH so every subsequent step sees
      #     it on PATH automatically.
      - name: Install asn1c from source (pinned commit 940dd5fa)
        run: |
          sudo apt-get remove -y asn1c || true
          sudo apt-get install -y git autoconf automake libtool make gcc g++ m4
          sudo git clone https://github.com/mouse07410/asn1c /tmp/asn1c
          cd /tmp/asn1c
          sudo git checkout 940dd5fa9f3917913fd487b13dfddfacd0ded06e
          sudo autoreconf -iv
          sudo ./configure --prefix=/opt/asn1c
          sudo make -j$(nproc)
          sudo make install
          sudo rm -rf /tmp/asn1c
          echo "/opt/asn1c/bin" >> "$GITHUB_PATH"
          /opt/asn1c/bin/asn1c -version

      # 6️⃣  Fetch the pinned FlexRIC source snapshot directly from GitLab.
      #     The archive tarball is more resilient than the git clone endpoint
      #     when GitLab is responding slowly or returning 502 errors.
      - name: Fetch FlexRIC source snapshot
        run: |
          wget -O /tmp/flexric.tar.gz \
            https://gitlab.eurecom.fr/mosaic5g/flexric/-/archive/d3dc645b4/flexric-d3dc645b4.tar.gz
          mkdir flexric
          tar xzf /tmp/flexric.tar.gz -C flexric --strip-components=1
          ls -la flexric | head -20

      # 7️⃣  Configure with the flags required by ns-O-RAN:
      #       -DE2AP_VERSION=E2AP_V1   → E2AP v1.01
      #       -DKPM_VERSION=KPM_V3_00  → KPM  v3.00
      #     (FlexRIC defaults differ: E2AP v2.03 / KPM v2.03)
      - name: Configure FlexRIC (E2AP_V1 / KPM_V3_00)
        working-directory: flexric
        run: |
          mkdir build
          cd build
          cmake .. \
            -DE2AP_VERSION=E2AP_V1 \
            -DKPM_VERSION=KPM_V3_00

      # 8️⃣  Build using all available cores on the runner.
      - name: Build FlexRIC
        working-directory: flexric/build
        run: make -j8

      # 9️⃣  Install the Service Models (SMs) to /usr/local/lib and
      #     /usr/local/include so that any subsequent consumer can find them.
      #     At the same time, re-run with DESTDIR to capture the exact file
      #     tree that was installed — this staging copy becomes the artifact
      #     that test-ns3 will download and unpack onto its fresh runner.
      - name: Install FlexRIC Service Models and package for artifact
        working-directory: flexric/build
        run: |
          sudo make install
          sudo make DESTDIR=/tmp/flexric-install install
          tar czf /tmp/flexric-installed.tar.gz -C /tmp/flexric-install .

      # 🔟  Upload the captured installed tree.  When extracted with
      #     `tar xzf ... -C /` on the ns-3 runner it restores every file to
      #     its original absolute path (e.g. /usr/local/lib/flexric/*.so).
      - name: Upload FlexRIC installed files artifact
        uses: actions/upload-artifact@v4
        with:
          name: flexric-install
          path: /tmp/flexric-installed.tar.gz
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 – FlexRIC Validation
  # Downloads the FlexRIC installed tree artifact and validates it.
  # ───────────────────────────────────────────────────────────────────────────
  test-flexric:
    name: "FlexRIC – Validate Install"
    runs-on: ubuntu-latest
    needs: [install-flexric , install-deps]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FlexRIC installed files artifact
        uses: actions/download-artifact@v4
        with:
          name: flexric-install
          path: .

      - name: Validate FlexRIC installed artifact
        run: |
          if [ ! -f flexric-installed.tar.gz ]; then
            echo "FlexRIC install artifact missing"
            exit 1
          fi
          mkdir -p /tmp/flexric-validate
          tar xzf flexric-installed.tar.gz -C /tmp/flexric-validate
          if [ ! -e /tmp/flexric-validate/usr/local/lib/flexric ]; then
            echo "FlexRIC installed files missing"
            exit 1
          fi
          echo "FlexRIC installed artifact is valid."

  test-ns3:
    name: "ns-3 mmWave – Build and Validate"
    runs-on: ubuntu-latest
    needs: [test-e2sim, test-flexric]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialise mmwave-LENA-oran submodule
        run: |
          git submodule init
          git submodule update --recursive -- mmwave-LENA-oran
          echo "mmwave-LENA-oran contents:"
          ls mmwave-LENA-oran/

      - name: Ensure oran-interface is populated
        run: |
          ORAN_DIR="mmwave-LENA-oran/contrib/oran-interface"
          if [ ! -f "$ORAN_DIR/CMakeLists.txt" ]; then
            echo "oran-interface is not present. Cloning fallback source..."
            rm -rf "$ORAN_DIR"
            git clone https://github.com/MinaYonan123/oran-interface.git "$ORAN_DIR"
          else
            echo "oran-interface already populated."
          fi

      - name: Ensure src/nr is populated
        run: |
          NR_DIR="mmwave-LENA-oran/src/nr"
          if [ ! -f "$NR_DIR/CMakeLists.txt" ]; then
            echo "src/nr is not present. Cloning fallback source..."
            rm -rf "$NR_DIR"
            git clone https://github.com/MinaYonan123/ns3-oran-lena-nr.git "$NR_DIR"
            cd "$NR_DIR"
            git checkout Lena_oran
          else
            echo "src/nr already populated."
          fi

      - name: Patch ns-3 O-RAN interface linkage
        run: |
          LTE_CMAKE="mmwave-LENA-oran/src/lte/CMakeLists.txt"
          if ! grep -q '\${ns3-oran-interface}' "$LTE_CMAKE"; then
            awk '/LIBRARIES_TO_LINK/{print; print "    ${ns3-oran-interface}"; next}1' "$LTE_CMAKE" > "$LTE_CMAKE.tmp" && mv "$LTE_CMAKE.tmp" "$LTE_CMAKE"
          fi
          MMWAVE_CMAKE="mmwave-LENA-oran/src/mmwave/CMakeLists.txt"
          if [ -f "$MMWAVE_CMAKE" ] && ! grep -q '\${ns3-oran-interface}' "$MMWAVE_CMAKE"; then
            awk '/LIBRARIES_TO_LINK/{print; print "    ${ns3-oran-interface}"; next}1' "$MMWAVE_CMAKE" > "$MMWAVE_CMAKE.tmp" && mv "$MMWAVE_CMAKE.tmp" "$MMWAVE_CMAKE"
          fi
          ORAN_CMAKE="mmwave-LENA-oran/contrib/oran-interface/CMakeLists.txt"
          if ! grep -q 'target_link_libraries(ns3.42-oran-interface-default PUBLIC e2sim)' "$ORAN_CMAKE"; then
            printf '\ncmake_policy(SET CMP0079 NEW)\n' >> "$ORAN_CMAKE"
            printf 'if(TARGET ns3.42-oran-interface-default)\n  target_link_libraries(ns3.42-oran-interface-default PUBLIC e2sim)\nendif()\n' >> "$ORAN_CMAKE"
          fi

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake \
            libsctp-dev libssl-dev \
            libpcre2-dev \
            python3-dev python3.8 \
            libconfig-dev libconfig++-dev

      - name: Install GCC-13 and set as default compiler
        run: |
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download e2sim build artifact
        uses: actions/download-artifact@v4
        with:
          name: e2sim-build
          path: e2sim-kpmv3/

      - name: Install E2SIM from downloaded artifact
        run: |
          if [ ! -f e2sim-kpmv3/e2sim/build/e2sim-dev_1.0.0_amd64.deb ]; then
            echo "E2SIM deb package not found in downloaded artifact"
            ls -R e2sim-kpmv3/e2sim/build
            exit 1
          fi
          sudo dpkg --install e2sim-kpmv3/e2sim/build/e2sim-dev_1.0.0_amd64.deb
          sudo ldconfig

      - name: Download FlexRIC installed files artifact
        uses: actions/download-artifact@v4
        with:
          name: flexric-install
          path: ${{ github.workspace }}

      - name: Restore FlexRIC installed files to system paths
        run: |
          sudo tar xzf flexric-installed.tar.gz -C /
          sudo ldconfig

      - name: Configure ns-3
        working-directory: mmwave-LENA-oran
        run: ./ns3 configure --disable-python --enable-examples

      - name: Build ns-3
        working-directory: mmwave-LENA-oran
        run: ./ns3 build

      - name: Validate ns-3 build
        run: |
          if [ ! -d mmwave-LENA-oran/build ]; then
            echo "ns-3 build directory missing"
            exit 1
          fi
          echo "ns-3 build is present."
