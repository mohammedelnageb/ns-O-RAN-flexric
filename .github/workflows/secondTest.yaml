name: ns-O-RAN-flexric Pipeline Test 2 xApps

on:
  workflow_dispatch:
  push:
    branches:
      - CI/CD_tests
      - main

env:
  CMAKE_VERSION:  '4.2.1'
  PYTHON_VERSION: '3.8'
  ASN1C_COMMIT:   '940dd5fa9f3917913fd487b13dfddfacd0ded06e'
  FLEXRIC_COMMIT: 'd3dc645b4'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1a — Build SWIG + asn1c  ┐
  # JOB 1b — Build E2SIM          ├─ all three run in parallel
  # (no shared deps between them) ┘
  # ═══════════════════════════════════════════════════════════════════════════

  build-tools:
    name: "Build SWIG + asn1c"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool bison flex \
            libpcre2-dev ca-certificates wget

      # ── SWIG ──────────────────────────────────────────────────────────────
      - name: Cache SWIG 4.1
        id: cache-swig
        uses: actions/cache@v4
        with:
          path: /usr/local/swig
          key: swig-4.1-${{ runner.os }}

      - name: Build SWIG 4.1
        if: steps.cache-swig.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch release-4.1 https://github.com/swig/swig.git
          cd swig && ./autogen.sh && ./configure --prefix=/usr/local/swig
          make -j$(nproc) && sudo make install

      # ── asn1c ─────────────────────────────────────────────────────────────
      - name: Cache asn1c
        id: cache-asn1c
        uses: actions/cache@v4
        with:
          path: /opt/asn1c
          key: asn1c-${{ env.ASN1C_COMMIT }}-${{ runner.os }}

      - name: Build asn1c
        if: steps.cache-asn1c.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/mouse07410/asn1c /tmp/asn1c
          cd /tmp/asn1c && git checkout ${{ env.ASN1C_COMMIT }}
          autoreconf -iv && ./configure --prefix=/opt/asn1c
          make -j$(nproc) && sudo make install

      - name: Package tools artifact
        run: tar -czf /tmp/build-tools.tar.gz /usr/local/swig /opt/asn1c

      - name: Upload tools artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-tools
          path: /tmp/build-tools.tar.gz

  # ─────────────────────────────────────────────────────────────────────────

  build-e2sim:
    name: "Build E2SIM"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install E2SIM build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libsctp-dev libssl-dev cmake \
            libboost-all-dev gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Build E2SIM and package .deb
        working-directory: e2sim-kpmv3/e2sim
        run: |
          mkdir -p build
          sudo ./build_e2sim.sh 3

      - name: Upload E2SIM .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2sim-deb
          path: e2sim-kpmv3/e2sim/build/e2sim-dev_1.0.0_amd64.deb

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build FlexRIC
  # Waits only on build-tools (needs SWIG + asn1c on PATH).
  # Does NOT wait on build-e2sim — the .deb is only needed at test-run time.
  # ═══════════════════════════════════════════════════════════════════════════
  build-flexric:
    name: "Build FlexRIC"
    runs-on: ubuntu-latest
    needs: build-tools
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FlexRIC build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git libsctp-dev libssl-dev \
            libconfig-dev libconfig++-dev sqlite3 libsqlite3-dev \
            libeigen3-dev cmake gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Setup CMake ${{ env.CMAKE_VERSION }}
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download tools artifact
        uses: actions/download-artifact@v4
        with:
          name: build-tools
          path: /tmp

      - name: Restore SWIG + asn1c
        run: |
          sudo tar -xzf /tmp/build-tools.tar.gz -C /
          echo "/usr/local/swig/bin" >> "$GITHUB_PATH"
          echo "/opt/asn1c/bin"      >> "$GITHUB_PATH"
          sudo ldconfig

      - name: Clone and build FlexRIC
        run: |
          git clone https://gitlab.eurecom.fr/mosaic5g/flexric.git
          cd flexric && git checkout ${{ env.FLEXRIC_COMMIT }}
          mkdir build && cd build
          cmake .. -DE2AP_VERSION=E2AP_V1 -DKPM_VERSION=KPM_V3_00
          make -j$(nproc)
          sudo make install && sudo ldconfig

      # Pack the FlexRIC artifact as a single tarball with two members:
      #
      #   flexric/                  — full source + build tree, which includes
      #                               all asn1c-generated *.h files under
      #                               flexric/build/  (they are NOT installed
      #                               by `make install` and therefore absent
      #                               from install_manifest.txt).
      #                               Carrying the whole tree avoids having to
      #                               enumerate or flatten those headers here;
      #                               build-ns3 will inject them after ns3
      #                               configure has created the target dirs.
      #
      #   flexric-prefix.tar.gz     — snapshot of every file placed by
      #                               `make install`, derived from cmake's
      #                               install_manifest.txt (shared libs,
      #                               installed headers, cmake config).
      - name: Package FlexRIC artifact
        run: |
          # Installed-prefix snapshot.
          MANIFEST=$(sed 's|^/||' \
            $GITHUB_WORKSPACE/flexric/build/install_manifest.txt \
            | tr '\n' ' ')
          sudo tar -czf /tmp/flexric-prefix.tar.gz -C / $MANIFEST

          # Outer archive — both members at the archive root so the consumer
          # can unpack with a single `tar -xzf ... -C $WORKSPACE`.
          tar -czf /tmp/flexric-build.tar.gz \
            -C $GITHUB_WORKSPACE flexric/ \
            -C /tmp flexric-prefix.tar.gz

      - name: Upload FlexRIC artifact
        uses: actions/upload-artifact@v4
        with:
          name: flexric-build
          path: /tmp/flexric-build.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Build ns-3
  # Waits on build-flexric because oran-interface links against libflexric.
  # ═══════════════════════════════════════════════════════════════════════════
  build-ns3:
    name: "Build ns-3"
    runs-on: ubuntu-latest
    needs: build-flexric
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ns-3 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libsctp-dev libssl-dev \
            libboost-all-dev libconfig-dev libconfig++-dev \
            sqlite3 libsqlite3-dev libeigen3-dev \
            python3-dev gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Setup CMake ${{ env.CMAKE_VERSION }}
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download FlexRIC artifact
        uses: actions/download-artifact@v4
        with:
          name: flexric-build
          path: ${{ github.workspace }}

      - name: Restore FlexRIC workspace + installed prefix
        run: |
          # Unpack the outer archive. Both members land in $GITHUB_WORKSPACE:
          #   flexric/                  → $GITHUB_WORKSPACE/flexric/
          #   flexric-prefix.tar.gz     → $GITHUB_WORKSPACE/flexric-prefix.tar.gz
          tar -xzf $GITHUB_WORKSPACE/flexric-build.tar.gz \
            -C $GITHUB_WORKSPACE

          # Restore cmake-installed headers/libs to their original prefix.
          sudo tar -xzf $GITHUB_WORKSPACE/flexric-prefix.tar.gz -C /
          sudo ldconfig

      - name: Ensure oran-interface is populated
        run: |
          ORAN_DIR="mmwave-LENA-oran/contrib/oran-interface"
          if [ -z "$(ls -A "$ORAN_DIR" 2>/dev/null)" ]; then
            rm -rf "$ORAN_DIR"
            git clone https://github.com/MinaYonan123/oran-interface.git "$ORAN_DIR"
          fi

      - name: Ensure src/nr is populated
        run: |
          NR_DIR="mmwave-LENA-oran/src/nr"
          if [ ! -f "$NR_DIR/CMakeLists.txt" ]; then
            rm -rf "$NR_DIR"
            git clone https://github.com/MinaYonan123/ns3-oran-lena-nr.git "$NR_DIR"
            cd "$NR_DIR" && git checkout Lena_oran
          fi

      # ns3 configure must run before we inject the asn1c headers because it
      # is what creates mmwave-LENA-oran/build/include/ns3/ — the directory
      # the compiler actually searches (visible in the -I flags in the error).
      # Injecting before configure is a no-op since the directory doesn't exist
      # yet; injecting after configure but before build is the correct order.
      - name: Configure ns-3
        working-directory: mmwave-LENA-oran
        run: |
          ./ns3 clean
          ./ns3 configure

      # The compiler resolves #include "E2SM-KPM-RANfunction-Description.h"
      # with a quoted (not angle-bracket) include, so it searches relative to
      # the including header's own directory first.  kpm-indication.h lives in
      # mmwave-LENA-oran/build/include/ns3/, which is exactly where we copy the
      # asn1c-generated headers.  /usr/local/include is NOT on the -I list and
      # therefore does not help.
      - name: Inject asn1c-generated headers into ns-3 build include path
        run: |
          NS3_INC="$GITHUB_WORKSPACE/mmwave-LENA-oran/build/include/ns3"
          find $GITHUB_WORKSPACE/flexric/build -name "*.h" \
            -exec cp -n {} "$NS3_INC/" \;

      - name: Build ns-3
        working-directory: mmwave-LENA-oran
        run: ./ns3 build -j$(nproc)

      - name: Package ns-3 artifact
        run: |
          tar -czf /tmp/ns3-build.tar.gz \
            -C $GITHUB_WORKSPACE \
            mmwave-LENA-oran/build/ \
            mmwave-LENA-oran/cmake-cache/ \
            mmwave-LENA-oran/.lock-ns3_linux_build

      - name: Upload ns-3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns3-build
          path: /tmp/ns3-build.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — KPM/RC xApp Integration Test
  # ═══════════════════════════════════════════════════════════════════════════
  test-kpm-rc:
    name: "KPM/RC xApp Integration Test"
    runs-on: ubuntu-latest
    needs: [build-ns3, build-e2sim]

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup test environment
        uses: ./.github/actions/test-env-setup

      - name: Execution and integration test (KPM/RC)
        shell: bash
        run: |
          $GITHUB_WORKSPACE/flexric/build/examples/ric/nearRT-RIC > /tmp/ric.log 2>&1 &
          RIC_PID=$!
          echo "RIC started (PID: $RIC_PID)"

          cd $GITHUB_WORKSPACE/mmwave-LENA-oran
          ./ns3 run --no-build scratch/scenario-zero.cc > /tmp/ns3.log 2>&1 &
          NS3_PID=$!
          echo "ns-3 E2-Node started (PID: $NS3_PID)"

          echo "Waiting for E2 connection setup (20s)..."
          sleep 20

          kill -0 $RIC_PID 2>/dev/null \
            || { echo "FAIL: RIC died during startup"; tail -20 /tmp/ric.log; exit 1; }
          kill -0 $NS3_PID 2>/dev/null \
            || { echo "FAIL: ns-3 died during startup"; tail -20 /tmp/ns3.log; exit 1; }

          echo "Starting xApp..."
          $GITHUB_WORKSPACE/flexric/build/examples/xApp/c/kpm_rc/xapp_kpm_rc \
            > /tmp/xapp.log 2>&1
          XAPP_EXIT=$?

          echo "=== RIC log (last 10 lines) ==="; tail -10 /tmp/ric.log  || true
          echo "=== ns-3 log (last 10 lines) ==="; tail -10 /tmp/ns3.log || true
          echo "=== xApp log (last 30 lines) ==="; tail -30 /tmp/xapp.log || true

          kill $RIC_PID $NS3_PID 2>/dev/null || true

          [ $XAPP_EXIT -eq 0 ] \
            && echo "SUCCESS: xApp completed its test run successfully." \
            || { echo "FAIL: xApp exited with code $XAPP_EXIT"; exit 1; }

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5 — ES xApp Integration Test
  # ═══════════════════════════════════════════════════════════════════════════
  test-es-xapp:
    name: "ES xApp Integration Test"
    runs-on: ubuntu-latest
    needs: [build-ns3, build-e2sim]
    continue-on-error: true

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup test environment
        uses: ./.github/actions/test-env-setup

      - name: Test ES xApp with RIC and ns-3
        shell: bash
        run: |
          $GITHUB_WORKSPACE/flexric/build/examples/ric/nearRT-RIC > /tmp/ric.log 2>&1 &
          RIC_PID=$!
          echo "RIC started (PID: $RIC_PID)"

          cd $GITHUB_WORKSPACE/mmwave-LENA-oran
          ./ns3 run --no-build \
            scratch/Energy_saving_with_cell_utilization_scenario.cc \
            > /tmp/ns3.log 2>&1 &
          NS3_PID=$!
          echo "ns-3 E2-Node started (PID: $NS3_PID)"

          echo "Waiting for E2 connection setup (20s)..."
          sleep 20

          kill -0 $RIC_PID 2>/dev/null \
            || { echo "FAIL: RIC died during startup"; tail -20 /tmp/ric.log; exit 1; }
          kill -0 $NS3_PID 2>/dev/null \
            || { echo "FAIL: ns-3 died during startup"; tail -20 /tmp/ns3.log; exit 1; }

          echo "Starting xApp (30s timeout)..."
          timeout --kill-after=5s 30s \
            $GITHUB_WORKSPACE/flexric/build/examples/xApp/c/orange/xapp_es_with_cell_util \
            > /tmp/xapp.log 2>&1 || true
          XAPP_EXIT=$?
          { [ $XAPP_EXIT -eq 124 ] || [ $XAPP_EXIT -eq 137 ]; } && XAPP_EXIT=0

          echo "=== RIC log (last 10 lines) ==="; tail -10 /tmp/ric.log  || true
          echo "=== ns-3 log (last 10 lines) ==="; tail -10 /tmp/ns3.log || true
          echo "=== xApp log (last 30 lines) ==="; tail -30 /tmp/xapp.log || true

          kill $RIC_PID $NS3_PID 2>/dev/null || true

          [ $XAPP_EXIT -eq 0 ] \
            && echo "SUCCESS: xApp completed its test run successfully." \
            || { echo "FAIL: xApp exited with code $XAPP_EXIT"; exit 1; }