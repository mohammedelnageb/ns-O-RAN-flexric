name: ns-O-RAN-flexric Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - CI/CD_tests
      - main


jobs:


# ============================================================
# BUILD E2SIM
# ============================================================

  build-e2sim:

    runs-on: ubuntu-latest

    name: Build E2SIM


    steps:


    - uses: actions/checkout@v4
      with:
        submodules: recursive


    - name: Install deps
      run: |
        set -e

        sudo apt update

        sudo apt install -y \
          build-essential \
          git \
          libsctp-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          bison \
          flex


    - name: Build E2SIM

      working-directory: e2sim-kpmv3/e2sim

      run: |
        set -e

        mkdir build

        sudo ./build_e2sim.sh 3



    - name: Upload E2SIM

      uses: actions/upload-artifact@v4

      with:

        name: e2sim-deb

        path: e2sim-kpmv3/e2sim/build/*.deb





# ============================================================
# BUILD FLEXRIC
# ============================================================


  build-flexric:

    runs-on: ubuntu-latest

    name: Build FlexRIC



    steps:


    - uses: actions/checkout@v4



    - name: Install dependencies

      run: |
        set -e


        sudo apt update


        sudo apt install -y \
          build-essential \
          cmake \
          git \
          swig \
          libsctp-dev \
          libssl-dev \
          libboost-all-dev \
          libconfig-dev \
          libconfig++-dev \
          sqlite3 \
          libsqlite3-dev \
          libeigen3-dev \
          autoconf \
          automake \
          libtool \
          bison \
          flex





    - name: Install ASN1C

      run: |
        set -e


        git clone \
        https://github.com/mouse07410/asn1c \
        /tmp/asn1c


        cd /tmp/asn1c


        git checkout 940dd5fa9f3917913fd487b13dfddfacd0ded06e


        autoreconf -iv


        ./configure \
        --prefix=/opt/asn1c


        make -j$(nproc)


        sudo make install


        echo "/opt/asn1c/bin" >> $GITHUB_PATH




    - name: Clone FlexRIC

      run: |
        set -e


        git clone \
        https://gitlab.eurecom.fr/mosaic5g/flexric.git


        cd flexric


        git checkout d3dc645b4





    - name: Build FlexRIC

      run: |
        set -e


        cd flexric


        mkdir build


        cd build


        cmake .. \
        -DE2AP_VERSION=E2AP_V1 \
        -DKPM_VERSION=KPM_V3_00



        make -j$(nproc)


        sudo make install


        sudo ldconfig





    - name: Check headers

      run: |
        set -e


        find /usr/local \
        -name "E2SM-KPM-RANfunction-Description.h"




    - name: Upload FlexRIC

      uses: actions/upload-artifact@v4


      with:

        name: flexric

        path: flexric





# ============================================================
# BUILD NS3
# ============================================================


  build-ns3:


    runs-on: ubuntu-latest

    name: Build ns3


    needs:

      - build-flexric
      - build-e2sim



    steps:


    - uses: actions/checkout@v4

      with:

        submodules: recursive





    - name: Download FlexRIC

      uses: actions/download-artifact@v4

      with:

        name: flexric

        path: .





    - name: Install dependencies

      run: |
        set -e


        sudo apt update


        sudo apt install -y \
          build-essential \
          cmake \
          git \
          python3-dev \
          libxml2-dev \
          libsqlite3-dev






    - name: Install FlexRIC

      run: |
        set -e


        ls -la


        cd flexric


        sudo cmake --install build


        sudo ldconfig



        echo "Checking KPM header"


        find /usr/local \
        -name "E2SM-KPM-RANfunction-Description.h"






    - name: Prepare ORAN interface

      run: |
        set -e


        ORAN="mmwave-LENA-oran/contrib/oran-interface"



        if [ ! -d "$ORAN/.git" ]

        then

          rm -rf $ORAN


          git clone \
          https://github.com/MinaYonan123/oran-interface.git \
          $ORAN

        fi





    - name: Prepare NR

      run: |
        set -e


        NR="mmwave-LENA-oran/src/nr"


        if [ ! -f "$NR/CMakeLists.txt" ]

        then


          rm -rf $NR


          git clone \
          https://github.com/MinaYonan123/ns3-oran-lena-nr.git \
          $NR



          cd $NR


          git checkout Lena_oran


        fi






    - name: Build ns3

      working-directory: mmwave-LENA-oran

      run: |
        set -e


        rm -rf cmake-cache


        ./ns3 clean


        ./ns3 configure


        ./ns3 build -j$(nproc)






    - name: Upload ns3

      uses: actions/upload-artifact@v4


      with:

        name: ns3

        path:

          mmwave-LENA-oran/build

          mmwave-LENA-oran/cmake-cache





# ============================================================
# TEST KPM
# ============================================================


  test-kpm:


    runs-on: ubuntu-latest


    needs:

      - build-e2sim
      - build-flexric
      - build-ns3



    steps:


    - uses: actions/checkout@v4



    - uses: actions/download-artifact@v4

      with:

        path: .




    - name: Run KPM

      run: |
        set -e


        sudo dpkg -i e2sim-deb/*.deb || true


        cp -r flexric .


        cp -r ns3 .


        sudo cmake --install flexric/build


        sudo ldconfig



        flexric/build/examples/ric/nearRT-RIC &



        cd mmwave-LENA-oran


        ./ns3 run --no-build scratch/scenario-zero.cc &


        sleep 20



        flexric/build/examples/xApp/c/kpm_rc/xapp_kpm_rc





# ============================================================
# TEST ES
# ============================================================


  test-es:


    runs-on: ubuntu-latest


    needs:

      - build-e2sim
      - build-flexric
      - build-ns3




    steps:


    - uses: actions/checkout@v4



    - uses: actions/download-artifact@v4

      with:

        path: .





    - name: Run ES

      run: |
        set -e



        sudo dpkg -i e2sim-deb/*.deb || true


        cp -r flexric .


        cp -r ns3 .



        sudo cmake --install flexric/build


        sudo ldconfig




        flexric/build/examples/ric/nearRT-RIC &




        cd mmwave-LENA-oran




        ./ns3 run \
        --no-build \
        scratch/Energy_saving_with_cell_utilization_scenario.cc &



        sleep 20



        timeout 30s \
        flexric/build/examples/xApp/c/orange/xapp_es_with_cell_util \
        || true