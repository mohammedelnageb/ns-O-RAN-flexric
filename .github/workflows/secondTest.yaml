name: ns-O-RAN-flexric Pipeline Optimized

on:
  workflow_dispatch:
  push:
    branches:
      - CI/CD_tests
      - main


jobs:


# ============================================================
# Build E2SIM
# ============================================================

  build-e2sim:

    name: Build E2SIM
    runs-on: ubuntu-latest


    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive


    - name: Install dependencies
      run: |

        sudo apt update

        sudo apt install -y \
          build-essential \
          git \
          libsctp-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          bison \
          flex



    - name: Build E2SIM

      working-directory: e2sim-kpmv3/e2sim

      run: |

        mkdir -p build

        sudo ./build_e2sim.sh 3



    - name: Upload E2SIM

      uses: actions/upload-artifact@v4

      with:

        name: e2sim-deb

        path: e2sim-kpmv3/e2sim/build/*.deb





# ============================================================
# Build FlexRIC
# ============================================================


  build-flexric:


    name: Build FlexRIC

    runs-on: ubuntu-latest


    steps:


    - uses: actions/checkout@v4



    - name: Install dependencies

      run: |

        sudo apt update


        sudo apt install -y \
          build-essential \
          cmake \
          git \
          swig \
          libsctp-dev \
          libssl-dev \
          libboost-all-dev \
          libconfig-dev \
          libconfig++-dev \
          sqlite3 \
          libsqlite3-dev \
          libeigen3-dev \
          autoconf \
          automake \
          libtool \
          bison \
          flex




    - name: Install GCC 13

      run: |

        sudo apt install -y gcc-13 g++-13


        sudo update-alternatives \
        --install /usr/bin/gcc gcc /usr/bin/gcc-13 130


        sudo update-alternatives \
        --install /usr/bin/g++ g++ /usr/bin/g++-13 130




    - name: Install ASN1C

      run: |


        git clone \
        https://github.com/mouse07410/asn1c \
        /tmp/asn1c


        cd /tmp/asn1c


        git checkout 940dd5fa9f3917913fd487b13dfddfacd0ded06e


        autoreconf -iv


        ./configure \
        --prefix=/opt/asn1c


        make -j$(nproc)

        sudo make install


        echo "/opt/asn1c/bin" >> $GITHUB_PATH





    - name: Clone FlexRIC

      run: |

        git clone \
        https://gitlab.eurecom.fr/mosaic5g/flexric.git


        cd flexric


        git checkout d3dc645b4





    - name: Build FlexRIC

      run: |

        cd flexric


        mkdir build


        cd build


        cmake .. \
        -DE2AP_VERSION=E2AP_V1 \
        -DKPM_VERSION=KPM_V3_00



        make -j$(nproc)


        sudo make install


        sudo ldconfig




    - name: Verify KPM headers

      run: |

        find /usr/local \
        -name "E2SM-KPM-RANfunction-Description.h"




    - name: Upload FlexRIC

      uses: actions/upload-artifact@v4

      with:

        name: flexric-build

        path: flexric/





# ============================================================
# Build NS3
# ============================================================


  build-ns3:


    name: Build ns3 ORAN

    runs-on: ubuntu-latest


    needs:

      - build-flexric
      - build-e2sim



    steps:



    - uses: actions/checkout@v4

      with:

        submodules: recursive




    - name: Download FlexRIC

      uses: actions/download-artifact@v4

      with:

        name: flexric-build

        path: .





    - name: Install dependencies

      run: |


        sudo apt update


        sudo apt install -y \

          build-essential \
          cmake \
          python3-dev \
          git \
          libxml2-dev \
          libsqlite3-dev





    - name: Install FlexRIC headers


      run: |


        cd flexric-build/flexric


        sudo cmake --install build


        sudo ldconfig



        echo "KPM HEADER CHECK"


        find /usr/local \
        -name "E2SM-KPM-RANfunction-Description.h"






    - name: Prepare ORAN interface

      run: |


        ORAN_DIR="mmwave-LENA-oran/contrib/oran-interface"



        if [ ! -d "$ORAN_DIR/.git" ]

        then


          rm -rf $ORAN_DIR


          git clone \
          https://github.com/MinaYonan123/oran-interface.git \
          $ORAN_DIR


        fi






    - name: Prepare NR


      run: |


        NR_DIR="mmwave-LENA-oran/src/nr"



        if [ ! -f "$NR_DIR/CMakeLists.txt" ]

        then


          rm -rf $NR_DIR


          git clone \
          https://github.com/MinaYonan123/ns3-oran-lena-nr.git \
          $NR_DIR



          cd $NR_DIR


          git checkout Lena_oran


        fi





    - name: Build ns3

      working-directory: mmwave-LENA-oran

      run: |


        rm -rf cmake-cache


        ./ns3 clean


        ./ns3 configure


        ./ns3 build -j$(nproc)





    - name: Upload ns3

      uses: actions/upload-artifact@v4


      with:

        name: ns3-build

        path:

          mmwave-LENA-oran/build

          mmwave-LENA-oran/cmake-cache





# ============================================================
# KPM TEST
# ============================================================


  test-kpm-rc:


    name: KPM RC xApp Test

    runs-on: ubuntu-latest


    needs:

      - build-e2sim
      - build-flexric
      - build-ns3



    steps:


    - uses: actions/checkout@v4


    - uses: actions/download-artifact@v4

      with:

        path: .



    - name: Install runtime

      run: |

        sudo apt update

        sudo apt install -y \
        libsctp-dev \
        libssl-dev \
        libboost-all-dev \
        libconfig-dev





    - name: Restore

      run: |


        sudo dpkg -i e2sim-deb/*.deb || true


        cp -r flexric-build/flexric .


        cp -r ns3-build/mmwave-LENA-oran .


        sudo cmake --install flexric/build


        sudo ldconfig




    - name: Run KPM


      run: |


        flexric/build/examples/ric/nearRT-RIC &


        cd mmwave-LENA-oran


        ./ns3 run --no-build scratch/scenario-zero.cc &


        sleep 20


        flexric/build/examples/xApp/c/kpm_rc/xapp_kpm_rc






# ============================================================
# ES TEST
# ============================================================


  test-es-xapp:


    name: ES xApp Test

    runs-on: ubuntu-latest


    needs:

      - build-e2sim
      - build-flexric
      - build-ns3



    steps:


    - uses: actions/checkout@v4


    - uses: actions/download-artifact@v4

      with:

        path: .



    - name: Restore

      run: |


        sudo dpkg -i e2sim-deb/*.deb || true


        cp -r flexric-build/flexric .


        cp -r ns3-build/mmwave-LENA-oran .


        sudo cmake --install flexric/build


        sudo ldconfig




    - name: Run ES


      run: |


        flexric/build/examples/ric/nearRT-RIC &



        cd mmwave-LENA-oran


        ./ns3 run \
        --no-build \
        scratch/Energy_saving_with_cell_utilization_scenario.cc &



        sleep 20



        timeout 30s \
        flexric/build/examples/xApp/c/orange/xapp_es_with_cell_util \
        || true