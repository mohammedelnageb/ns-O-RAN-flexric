# .github/actions/test-env-setup/action.yml
#
# Composite action shared by test-kpm-rc and test-es-xapp.
#
# IMPORTANT: The calling job MUST run actions/checkout BEFORE this action,
# because GitHub Actions resolves local `uses: ./.github/actions/...` paths
# from the checked-out workspace. This action deliberately omits checkout
# so the caller controls ref/submodule options.
#
name: "Test environment setup"
description: >
  Installs runtime deps, cmake, python, gcc, downloads and restores the
  three build artifacts, then installs the system libraries needed to run
  the FlexRIC xApp integration tests.

runs:
  using: composite
  steps:
    # Runtime-only deps — no build tools (SWIG, asn1c, autoconf, etc.)
    # needed here because we install pre-built artifacts, not compile them.
    - name: Cache apt packages (test jobs)
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-test-${{ runner.os }}-${{ hashFiles('.github/apt-packages-test.txt') }}
        restore-keys: apt-test-${{ runner.os }}-

    - name: Install system runtime dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsctp-dev libssl-dev libboost-all-dev \
          libconfig-dev libconfig++-dev sqlite3 libsqlite3-dev \
          libeigen3-dev \
          gcc-13 g++-13
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Download FlexRIC artifact
      uses: actions/download-artifact@v4
      with:
        name: flexric-build
        path: ${{ github.workspace }}

    - name: Download E2SIM .deb artifact
      uses: actions/download-artifact@v4
      with:
        name: e2sim-deb
        path: /tmp/e2sim/

    - name: Download ns-3 artifact
      uses: actions/download-artifact@v4
      with:
        name: ns3-build
        path: ${{ github.workspace }}

    - name: Restore artifacts
      shell: bash
      run: |
        tar -xzf $GITHUB_WORKSPACE/flexric-build.tar.gz -C $GITHUB_WORKSPACE
        tar -xzf $GITHUB_WORKSPACE/ns3-build.tar.gz     -C $GITHUB_WORKSPACE

    - name: Install E2SIM and FlexRIC system libraries
      shell: bash
      run: |
        sudo dpkg --install /tmp/e2sim/e2sim-dev_1.0.0_amd64.deb
        sudo cmake --install $GITHUB_WORKSPACE/flexric/build
        sudo ldconfig